name: Bug Report
description: Report a bug in orchestrate.nvim
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this issue.
  - type: input
    id: nvim_version
    attributes:
      label: Neovim Version
      placeholder: "e.g. NVIM v0.10.4"
    validations:
      required: true
  - type: input
    id: plugin_version
    attributes:
      label: Plugin Version
      placeholder: "commit hash or release tag"
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Minimal Config
      description: Include a minimal lazy.nvim spec or setup snippet
      render: lua
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      render: markdown
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

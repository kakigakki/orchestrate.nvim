name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Setup StyLua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          version: latest
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check formatting
        run: stylua --check lua plugin

      - name: Run tests
        run: |
          nvim --headless --clean -u NONE \
            +"set rtp+=." \
            +"luafile tests/run.lua" \
            +q

      - name: Validate plugin loads
        run: |
          nvim --headless --clean -u NONE \
            +"set rtp+=." \
            +"lua require('orchestrate').setup({})" \
            +q
